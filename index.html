He ajustado la función guardarTurno para que sea más robusta y la función calcular para que no falle si el texto del estilo no tiene paréntesis.

Reemplazá estas funciones en tu bloque <script>:

JavaScript

    async function calcular() {
        const tam = parseFloat(document.getElementById('tamaño').value);
        const selector = document.getElementById('complejidad');
        const comp = parseFloat(selector.value);
        
        // Extraemos el nombre del estilo de forma segura
        let fullText = selector.options[selector.selectedIndex].text;
        let match = fullText.match(/\(([^)]+)\)/);
        estiloNombre = match ? match[1] : fullText;

        if (isNaN(tam) || tam < 5) return alert("Ingresá un tamaño válido");

        const precios = datosCargados.precios;
        let base = (comp == 1) ? precios.baja : precios.mediaAlta;
        
        // Fórmula de bloques adicionales: $Total = Base + Extra$
        let extra = (tam < 15) ? 0 : Math.ceil((tam - 15) / 5) * 40000;
        totalCalculado = base + extra;

        const resDiv = document.getElementById('resultado');
        resDiv.innerHTML = `
            <div id="tarjeta-quote" style="background:#1a1a1a; padding:20px; border-radius:15px; border:1px solid #333; text-align:center;">
                <img src="logo2026.png" style="width:60px; margin-bottom:10px;">
                <h2 style="color:#e63946; margin:0;">$${totalCalculado.toLocaleString()}</h2>
                <p style="font-size:0.8rem; color:#888;">${estiloNombre} - ${tam}cm</p>
                <button onclick="alert('¡Sacá captura!')" style="background:#444; color:white; border:none; padding:5px 10px; border-radius:5px; font-size:0.7rem; cursor:pointer;">LISTO PARA CAPTURA</button>
            </div>
        `;
        resDiv.style.display = "block";
        document.getElementById('seccion-reserva').style.display = "block";
    }

    async function guardarTurno() {
        const nombre = document.getElementById('nombre-cliente').value;
        const whatsapp = document.getElementById('tel-cliente').value;
        const tam = document.getElementById('tamaño').value;
        const hora = document.getElementById('hora-turno').value;

        if(!nombre || !whatsapp) return alert("Completá tus datos para agendar");

        // Obtenemos la fecha actual del sistema del cliente (Buenos Aires)
        const fechaActual = new Date().toLocaleDateString('es-AR');

        const payload = { 
            accion: "reservar", 
            nombre, 
            whatsapp,
            tam, 
            hora, 
            fecha: fechaActual,
            comp: estiloNombre, 
            total: totalCalculado 
        };

        try {
            await fetch(URL_SCRIPT, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload)
            });

            alert("¡Turno enviado! En un minuto aparecerá en tu agenda.");
            
            const mensaje = `Hola! Soy ${nombre}, coticé un tattoo de "${estiloNombre}" de ${tam}cm ($${totalCalculado.toLocaleString()}). Quiero agendar para las ${hora}!`;
            window.open(`https://wa.me/1157734552?text=${encodeURIComponent(mensaje)}`);
            
        } catch (e) { alert("Error al enviar"); }
    }
