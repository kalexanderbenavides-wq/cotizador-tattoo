<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tattoo Quote Pro - Studio Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bungee+Hairline&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --negro-profundo: #0d0d0d;
            --gris-oscuro: #1a1a1a;
            --rojo-tinta: #e63946;
            --texto: #f1f1f1;
            --borde: #333;
        }

        body {
            background-color: var(--negro-profundo);
            color: var(--texto);
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            background: var(--gris-oscuro);
            padding: 30px;
            border-radius: 24px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            border: 1px solid var(--borde);
        }

        h1 {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
            margin-bottom: 30px;
            color: var(--rojo-tinta);
        }

        label {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 8px;
            display: block;
        }

        input, select {
            width: 100%;
            background: #111;
            border: 1px solid var(--borde);
            padding: 15px;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            margin-bottom: 20px;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--rojo-tinta); }

        .btn-calc {
            background: var(--rojo-tinta);
            color: white;
            width: 100%;
            padding: 18px;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(230, 57, 70, 0.3);
        }

        .btn-reset {
            background: transparent;
            color: #666;
            margin-top: 15px;
            width: 100%;
            border: none;
            font-size: 0.9rem;
            cursor: pointer;
        }

        #resultado {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px dashed var(--borde);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .inv-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            align-items: center;
            background: #111;
            padding: 10px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="card">
        <div style="text-align: center; margin-bottom: 20px;">
            <img src="logo2026.png" alt="Logo Estudio" style="max-width: 120px; height: auto;">
        </div>
        <h1>Cotizador Estudio</h1>
        
        <label>Tamaño (5cm - 50cm):</label>
        <input type="number" id="tamaño" placeholder="Ej: 15" min="5" max="50">

        <label>Complejidad / Estilo:</label>
        <select id="complejidad">
            <option value="1">Baja (Solo líneas)</option>
            <option value="1.5">Media (Sombras / Detalle)</option>
            <option value="2">Alta (Realismo / Full Color)</option>
        </select>

        <div class="btn-group">
            <button class="btn-calc" onclick="calcular()">COTIZAR</button>
            <button class="btn-reset" onclick="reinicio()">LIMPIAR</button>
        </div>

        <div id="resultado" style="display:none;"></div>

        <div id="seccion-reserva" style="display:none; margin-top:20px;">
            <label>Elegí tu horario:</label>
            <select id="hora-turno">
                <option value="11:00">Mañana (11:00 AM)</option>
                <option value="14:00">Tarde 1 (02:00 PM)</option>
                <option value="17:00">Tarde 2 (05:00 PM)</option>
            </select>
            
            <label>Tu Nombre:</label>
            <input type="text" id="nombre-cliente" placeholder="Nombre completo">
            <label>WhatsApp:</label>
            <input type="tel" id="tel-cliente" placeholder="Ej: 1123456789">
            
            <button class="btn-calc" onclick="guardarTurno()" style="background: #25d366;">RESERVAR TURNO</button>
        </div>

        <hr style="margin-top:50px; border: 0.5px solid #333;">
        <button onclick="abrirPanelArtista()" style="background:none; border:none; color:#444; width:100%; cursor:pointer;">⚙ Acceso Artista</button>

        <div id="panel-artista" style="display:none; background:#111; padding:20px; border-radius:15px; margin-top:20px;">
            <h3>Gestión de Insumos</h3>
            <div id="lista-inventario"></div>
            <button class="btn-calc" onclick="enviarDescuentoStock()" style="margin-top:20px; background:#444;">DESCONTAR DEL EXCEL</button>
        </div>
    </div>

    <script>
        let datosCargados = { precios: {}, inventario: [], turnos: [] };
        let totalCalculado = 0;
        let estiloNombre = ""; 
        let cargando = false; 
        const MI_PIN = "1234"; 
        const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbxPt9JcsqYVTzYih1O_KBMHuwh4SmPRzVLzGSPIFQRij606SmFC2cGCPXUgTfyPui8-/exec";

        async function cargarDatos() {
            if (cargando) return;
            cargando = true;
            try {
                const res = await fetch(URL_SCRIPT + "?v=" + Date.now());
                const data = await res.json();
                datosCargados = {
                    precios: data.precios || {},
                    inventario: data.inventario || [],
                    turnos: data.turnos || []
                };
            } catch (e) {
                console.error("Error sincronizando:", e);
            } finally {
                cargando = false;
            }
        }
        window.addEventListener('DOMContentLoaded', cargarDatos);

        async function calcular() {
            const tam = parseFloat(document.getElementById('tamaño').value);
            const selector = document.getElementById('complejidad');
            const comp = parseFloat(selector.value);
            
            let fullText = selector.options[selector.selectedIndex].text;
            let match = fullText.match(/\(([^)]+)\)/);
            estiloNombre = match ? match[1] : fullText;

            if (isNaN(tam) || tam < 5) return alert("Ingresá un tamaño válido (mín. 5cm)");

            const precios = datosCargados.precios;
            let base = (comp == 1) ? precios.baja : precios.mediaAlta;
            let extra = (tam < 15) ? 0 : Math.ceil((tam - 15) / 5) * 40000;
            
            totalCalculado = base + extra;

            const resDiv = document.getElementById('resultado');
            resDiv.innerHTML = `
                <div id="tarjeta-quote" style="background: #0d0d0d; padding: 40px 20px; border-radius: 20px; border: 1px solid #333; text-align: center; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.8);">
                    <img src="logo2026.png" style="width: 70px; margin-bottom: 20px; opacity: 0.8;">
                    <h2 style="font-family: 'Bungee Hairline', sans-serif; font-size: 3.5rem; font-weight: 400; color: white; margin: 0; line-height: 1;">
                        $${totalCalculado.toLocaleString()}
                    </h2>
                    <p style="font-family: 'Inter', sans-serif; text-transform: uppercase; letter-spacing: 4px; font-size: 0.65rem; color: var(--rojo-tinta); margin-top: 15px; font-weight: 700;">
                        ${estiloNombre} • ${tam}CM
                    </p>
                    <div style="margin-top: 30px;">
                        <button onclick="prepararCaptura()" id="btn-foto" style="background: none; border: 1px solid #444; color: #666; padding: 10px 20px; border-radius: 50px; font-size: 0.6rem; letter-spacing: 1px; cursor: pointer; transition: 0.3s;">
                            PREPARAR CAPTURA
                        </button>
                    </div>
                </div>
            `;
            resDiv.style.display = "block";
            document.getElementById('seccion-reserva').style.display = "block";
        }

        // FUNCIÓN NUEVA: Para que el botón de captura funcione
        function prepararCaptura() {
            document.getElementById('btn-foto').style.display = 'none';
            document.getElementById('seccion-reserva').style.display = 'none';
            alert("¡Pantalla lista! Sacá la captura para tu historia. Tocá cualquier lado para volver.");
            
            window.onclick = function() {
                document.getElementById('btn-foto').style.display = 'inline-block';
                document.getElementById('seccion-reserva').style.display = 'block';
                window.onclick = null;
            };
        }

        async function guardarTurno() {
            const nombre = document.getElementById('nombre-cliente').value;
            const whatsapp = document.getElementById('tel-cliente').value;
            const tam = document.getElementById('tamaño').value;
            const hora = document.getElementById('hora-turno').value;

            if(!nombre || !whatsapp) return alert("Por favor, completa tus datos");

            try {
                await fetch(URL_SCRIPT, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({
                        accion: "reservar", 
                        nombre, whatsapp, tam, hora, 
                        comp: estiloNombre, 
                        total: totalCalculado
                    })
                });

                alert("¡Turno enviado! En un minuto aparecerá en tu calendario.");
                const mensaje = `Hola! Soy ${nombre}, coticé un tattoo de "${estiloNombre}" de ${tam}cm ($${totalCalculado.toLocaleString()}). Quiero agendar para las ${hora}!`;
                window.location.href = `https://wa.me/1157734552?text=${encodeURIComponent(mensaje)}`;
                
            } catch (e) { alert("Error al conectar con el servidor"); }
        }

        function abrirPanelArtista() {
            if (datosCargados.inventario.length === 0) {
                alert("Todavía se están cargando los datos del Excel. Esperá 2 segundos.");
                cargarDatos();
                return;
            }
            if (prompt("PIN de Artista:") !== MI_PIN) return alert("PIN Incorrecto");
            document.getElementById('panel-artista').style.display = "block";
            renderizarPanel();
        }

        function renderizarPanel() {
            let htmlTurnos = "<h4>¿Qué turno terminaste?</h4>";
            htmlTurnos += "<select id='select-turno' style='width:100%; padding:10px; margin-bottom:20px; background:#222; color:white; border-radius:10px;'>";
            if (datosCargados.turnos.length > 0) {
                htmlTurnos += "<option value=''>-- Seleccioná el cliente --</option>";
                datosCargados.turnos.forEach(t => {
                    htmlTurnos += `<option value="${t.fila}">${t.cliente.toUpperCase()} (${t.detalle})</option>`;
                });
            } else {
                htmlTurnos += "<option value=''>No hay turnos pendientes</option>";
            }
            htmlTurnos += "</select>";

            let htmlInv = "<h4>Insumos usados:</h4>";
            datosCargados.inventario.forEach((item, i) => {
                htmlInv += `
                <div class="inv-item">
                    <span style="font-size:0.85rem;">${item.nombre} <br><small style="color:#666;">Stock: ${item.stock || 0}</small></span>
                    <input type="number" id="inv-${i}" value="0" min="0" style="width:50px; background:#000; color:#0ff; border:1px solid #333; text-align:center; padding:5px; border-radius:5px;">
                </div>`;
            });
            document.getElementById('lista-inventario').innerHTML = htmlTurnos + htmlInv;
        }

        async function enviarDescuentoStock() {
            const filaTurno = document.getElementById('select-turno').value;
            const btn = event.target;
            btn.innerText = "Sincronizando...";
            btn.disabled = true;

            let items = [];
            datosCargados.inventario.forEach((item, i) => {
                let cant = parseInt(document.getElementById(`inv-${i}`).value);
                if(cant > 0) items.push({ fila: item.fila, cantidad: cant });
            });

            try {
                await fetch(URL_SCRIPT, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ accion: "descontar", itemsADescontar: items, filaTurno: filaTurno })
                });
                alert("¡Proceso terminado! Stock actualizado en Excel.");
                location.reload(); 
            } catch (e) {
                alert("Error de conexión");
                btn.disabled = false;
                btn.innerText = "DESCONTAR DEL EXCEL";
            }
        }

        function reinicio() {
            document.getElementById('tamaño').value = "";
            document.getElementById('resultado').style.display = "none";
            document.getElementById('seccion-reserva').style.display = "none";
            totalCalculado = 0;
        }
    </script>
</body>
</html>
